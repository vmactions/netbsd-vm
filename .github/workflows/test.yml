
name: Test

on:
  workflow_dispatch:
  release:
    types: [ published ]
  push:
    branches:
      - '*'
    paths:
      - '**.sh'
      - '.github/workflows/test.yml'
      - 'index.js'
      - 'conf/*'
      - 'hooks/*'



concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true



jobs:
  testsshfs:
    strategy:
      fail-fast: false
      matrix:
        release: [ "9.0", "9.1", "9.2", "9.3", "9.4", "10.0", "10.1"
, ""]
        arch: [ "aarch64", "", "riscv64", "powerpc64", "sparc64", "ppc64le", "s390x"]
        runs: [ "ubuntu-24.04", "ubuntu-24.04-arm"]
        exclude:
          - runs: "ubuntu-24.04-arm"
            arch: ""
          - runs: "ubuntu-24.04-arm"
            arch: "riscv64"
          - runs: "ubuntu-24.04-arm"
            arch: "powerpc64"
          - runs: "ubuntu-24.04-arm"
            arch: "sparc64"
          - runs: "ubuntu-24.04-arm"
            arch: "ppc64le"
          - runs: "ubuntu-24.04-arm"
            arch: "s390x"
          # Manual matrix excludes only; combos with no conf are auto-excluded.
          # sparc64 (QEMU sun4u, TCG) is still built and shipped, but NOT
          # CI-tested: the emulated CMD646 PCI-IDE and wm0 NIC intermittently
          # lose interrupts under net+disk DMA, so the guest occasionally fails
          # to boot (cmdide0 "lost interrupt" -> stalls -> ssh probe times out).
          # The single-key exclude drops every sparc64 combo from all test jobs.
          # Mirrors anyvm's netbsd.yml stance; run sparc64 by hand if needed.
          - arch: "sparc64"
          - release: "9.0"
            arch: riscv64
          - release: "9.0"
            arch: powerpc64
          - release: "9.0"
            arch: sparc64
          - release: "9.0"
            arch: ppc64le
          - release: "9.0"
            arch: s390x
          - release: "9.1"
            arch: riscv64
          - release: "9.1"
            arch: powerpc64
          - release: "9.1"
            arch: sparc64
          - release: "9.1"
            arch: ppc64le
          - release: "9.1"
            arch: s390x
          - release: "9.2"
            arch: riscv64
          - release: "9.2"
            arch: powerpc64
          - release: "9.2"
            arch: sparc64
          - release: "9.2"
            arch: ppc64le
          - release: "9.2"
            arch: s390x
          - release: "9.3"
            arch: riscv64
          - release: "9.3"
            arch: powerpc64
          - release: "9.3"
            arch: sparc64
          - release: "9.3"
            arch: ppc64le
          - release: "9.3"
            arch: s390x
          - release: "9.4"
            arch: riscv64
          - release: "9.4"
            arch: powerpc64
          - release: "9.4"
            arch: sparc64
          - release: "9.4"
            arch: ppc64le
          - release: "9.4"
            arch: s390x
          - release: "10.0"
            arch: riscv64
          - release: "10.0"
            arch: powerpc64
          - release: "10.0"
            arch: ppc64le
          - release: "10.0"
            arch: s390x
          - release: "10.1"
            arch: riscv64
          - release: "10.1"
            arch: powerpc64
          - release: "10.1"
            arch: ppc64le
          - release: "10.1"
            arch: s390x
          - release: ""
            arch: riscv64
          - release: ""
            arch: powerpc64
          - release: ""
            arch: ppc64le
          - release: ""
            arch: s390x


    runs-on: ${{ matrix.runs }}
    name: sshfs NetBSD
    env:
      MYTOKEN : ${{ secrets.MYTOKEN }}
      MYTOKEN2: "value2"
      DEBUG: 1
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
    - uses: actions/checkout@v6
#    - name: Creating Web console
#      if: ${{ contains(fromJSON('{"x86_64":["rsync","scp","sshfs","nfs"],"aarch64":["rsync","scp","sshfs","nfs"],"riscv64":["rsync","scp","sshfs","nfs"],"powerpc64":[],"sparc64":["scp","sshfs","nfs"],"ppc64le":[],"s390x":[]}')[matrix.arch == '' && 'x86_64' || matrix.arch], 'sshfs') }}
#      uses: vmactions/cf-tunnel@v0
#      id: tunnel
#      with:
#        protocol: http
#        port: 8000

    - name: Test in NetBSD
      if: ${{ contains(fromJSON('{"x86_64":["rsync","scp","sshfs","nfs"],"aarch64":["rsync","scp","sshfs","nfs"],"riscv64":["rsync","scp","sshfs","nfs"],"powerpc64":[],"sparc64":["scp","sshfs","nfs"],"ppc64le":[],"s390x":[]}')[matrix.arch == '' && 'x86_64' || matrix.arch], 'sshfs') }}
      id: test
      uses: vmactions/netbsd-vm@a4d51ffb75d71f99e469e2edaf726c8466d44e1e
      with:
        envs: 'DEBUG MYTOKEN MYTOKEN2'
        prepare: |
          /usr/sbin/pkg_add -u curl
        mem: 4096
        release: ${{ matrix.release }}
        arch: ${{ matrix.arch }}
        nat: |
          "20022": "22"
          "8080": "80"
          "8443": "443"
          udp:"8081": "80"
        usesh: true
        debug: true
        debug-on-error: ${{ vars.DEBUG_ON_ERROR }}
        sync: sshfs
        run: |
          set -e
          ls -lah $HOME/work
          if [ -z "$(ls -A $HOME/work)" ]; then
            echo "sshfs error."
            exit 1
          fi
          echo "TEST_ENV=abc" >>${GITHUB_ENV}
          echo "textfromvm" >$GITHUB_WORKSPACE/vm.txt
          cd $GITHUB_WORKSPACE;
          ls -lah
          whoami
          env
          /sbin/sysctl hw.model
          /sbin/sysctl hw.ncpu
          /sbin/sysctl hw.physmem
          /sbin/sysctl hw.usermem
          /usr/bin/vmstat


    - name: Test NAT
      if: ${{ contains(fromJSON('{"x86_64":["rsync","scp","sshfs","nfs"],"aarch64":["rsync","scp","sshfs","nfs"],"riscv64":["rsync","scp","sshfs","nfs"],"powerpc64":[],"sparc64":["scp","sshfs","nfs"],"ppc64le":[],"s390x":[]}')[matrix.arch == '' && 'x86_64' || matrix.arch], 'sshfs') }}
      env:
        VM_USER: ""
      run: |
        set -e
        echo "TEST_ENV=$TEST_ENV"
        [ "$TEST_ENV" = "abc" ]
        ssh -v -p 20022 ${VM_USER:-root}@localhost  "uname -a;whoami;pwd"
    - name: Test custom shell
      if: ${{ contains(fromJSON('{"x86_64":["rsync","scp","sshfs","nfs"],"aarch64":["rsync","scp","sshfs","nfs"],"riscv64":["rsync","scp","sshfs","nfs"],"powerpc64":[],"sparc64":["scp","sshfs","nfs"],"ppc64le":[],"s390x":[]}')[matrix.arch == '' && 'x86_64' || matrix.arch], 'sshfs') }}
      shell: netbsd {0}
      run: |
        pwd
          cd $GITHUB_WORKSPACE;
          ls -lah
          whoami
          env
          /sbin/sysctl hw.model
          /sbin/sysctl hw.ncpu
          /sbin/sysctl hw.physmem
          /sbin/sysctl hw.usermem
          /usr/bin/vmstat

    - name: Collect VM debug artifacts
      if: failure()
      run: |
        mkdir -p ./vm-debug-artifacts
        find /home/runner/work/_actions -type d -name output 2>/dev/null | while read d; do
          find "$d" -type f \( -name "*.log" -o -name "*.ppm" \) | while read f; do
            rel="${f#/home/runner/work/_actions/}"
            mkdir -p "./vm-debug-artifacts/$(dirname "$rel")"
            cp "$f" "./vm-debug-artifacts/$rel"
          done
        done
        echo "Collected:"
        find ./vm-debug-artifacts -type f || true
    - name: Upload VM debug artifacts
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: vm-debug-${{ github.job }}-${{ strategy.job-index }}
        path: vm-debug-artifacts/
        retention-days: 7
        if-no-files-found: ignore






