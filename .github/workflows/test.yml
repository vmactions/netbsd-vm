  testerr:
    strategy:
      fail-fast: false
    runs-on: ubuntu-24.04
    name: test default error NetBSD
    steps:
    - uses: actions/checkout@v6
    - name: Test in NetBSD
      id: testerr
      continue-on-error: true
      uses: vmactions/netbsd-vm@a4d51ffb75d71f99e469e2edaf726c8466d44e1e
      with:
        usesh: true
        debug: true
        run: |
          echo "this is an error"
          false
    - name: Verify that the previous step failed
      if: steps.testerr.outcome != 'failure'
      run: |
        echo "The step was expected to fail, but it succeeded!"
        exit 1
    - name: Verify that the previous step succeeded
      if: steps.testerr.outcome == 'failure'
      run: |
        echo "The step was expected to fail, and it failed!"
        exit 0

  testpass:
    strategy:
      fail-fast: false
    runs-on: ubuntu-24.04
    name: test default success NetBSD
    steps:
    - uses: actions/checkout@v6
    - name: Test in NetBSD
      id: testpass
